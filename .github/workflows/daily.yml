name: Dispatch daily

on:
  # 10:30 Beijing every day = 02:30 UTC.
  # GitHub Actions cron can drift a few minutes under load.
  schedule:
    - cron: "30 2 * * *"
  # Manual trigger from the Actions tab.
  workflow_dispatch:
  # Rebuild whenever main changes too.
  push:
    branches: [main]

permissions:
  contents: write  # commit refreshed data/news.json back to the repo
  pages: write
  id-token: write

concurrency:
  group: dispatch-daily
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Refresh RSS data
        run: npx tsx scripts/fetch-feeds.ts

      - name: Commit refreshed data
        run: |
          if [[ -n "$(git status --porcelain data/news.json)" ]]; then
            git config user.name  "dispatch-bot"
            git config user.email "dispatch-bot@users.noreply.github.com"
            git add data/news.json
            git commit -m "chore(data): daily refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No data changes."
          fi

      - name: Build static site
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          npm run build
          touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Push WeChat digest
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          DISPATCH_SITE_URL: ${{ steps.deploy.outputs.page_url }}
        run: npx tsx scripts/daily-digest.ts --mode joke
